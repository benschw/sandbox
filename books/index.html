<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f8f6f2;
      --surface:       #ffffff;
      --border:        #e4dfd7;
      --text:          #18150e;
      --muted:         #7a7268;
      --accent:        #2e5c35;
      --accent-subtle: #edf4ee;
      --star:          #bf9118;
      --f-display:     'Cormorant Garamond', Georgia, serif;
      --f-body:        'Inter', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--f-body);
      font-size: 15px;
      line-height: 1.6;
      padding: 3.5rem 1.5rem 5rem;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 3rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-family: var(--f-display);
      font-size: 2.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .updated {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Section headings ── */
    .section-head {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    h2 {
      font-family: var(--f-display);
      font-size: 1.45rem;
      font-weight: 500;
      font-style: italic;
    }
    .count {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--f-body);
      font-style: normal;
    }

    /* ── Currently Reading ── */
    #current { margin-bottom: 3.5rem; }

    .current-card {
      display: flex;
      gap: 1.25rem;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem 1.25rem 1.25rem;
      margin-bottom: 0.75rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .current-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .current-card:last-child { margin-bottom: 0; }

    /* Signature: page-edge effect on cover */
    .cover-wrap {
      position: relative;
      flex-shrink: 0;
      margin-right: 6px; /* room for the edge */
    }
    .cover-wrap::after {
      content: '';
      position: absolute;
      right: -9px;
      top: 4px;
      bottom: 4px;
      width: 9px;
      background: repeating-linear-gradient(
        to right,
        #e8dfc9 0px,
        #f5edda 1.5px,
        #ece4ce 3px
      );
      border-radius: 0 2px 2px 0;
      box-shadow: 2px 1px 5px rgba(0,0,0,0.09);
    }
    .cover-img {
      display: block;
      width: 78px;
      height: 118px;
      object-fit: cover;
      border-radius: 3px;
      box-shadow: -2px 2px 8px rgba(0,0,0,0.14);
    }
    .cover-placeholder {
      width: 78px;
      height: 118px;
      background: var(--accent-subtle);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--f-display);
      font-size: 1.75rem;
      font-style: italic;
      color: var(--accent);
    }

    .current-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-left: 0.25rem;
    }
    .book-title {
      font-family: var(--f-display);
      font-size: 1.3rem;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 0.2rem;
    }
    .book-author {
      font-size: 0.83rem;
      color: var(--muted);
      margin-bottom: 0.9rem;
    }
    .reading-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .reading-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── History grid ── */
    #history { margin-bottom: 2rem; }

    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(98px, 1fr));
      gap: 10px;
    }
    .grid-item {
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      cursor: default;
      line-height: 0; /* kills phantom gap under img */
    }
    .grid-cover {
      display: block;
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
    }
    .grid-placeholder {
      width: 100%;
      aspect-ratio: 2 / 3;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--f-display);
      font-size: 1.4rem;
      font-style: italic;
      color: var(--muted);
    }
    .grid-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(14, 11, 6, 0.96) 0%,
        rgba(14, 11, 6, 0.75) 55%,
        rgba(14, 11, 6, 0.0) 100%
      );
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 8px 8px;
      opacity: 0;
      transition: opacity 0.18s ease;
      line-height: 1.3;
    }
    .grid-item:hover .grid-overlay { opacity: 1; }
    .overlay-title {
      font-family: var(--f-display);
      font-size: 0.82rem;
      font-weight: 600;
      color: #f2ebe0;
      margin-bottom: 2px;
    }
    .overlay-author {
      font-size: 0.65rem;
      color: #9e9488;
      margin-bottom: 5px;
    }
    .stars {
      font-size: 0.62rem;
      color: var(--star);
      letter-spacing: 1.5px;
    }

    /* ── Year groups ── */
    .year-group { margin-bottom: 2rem; }
    .year-group:last-child { margin-bottom: 0; }
    .year-label {
      font-family: var(--f-display);
      font-size: 1.15rem;
      font-style: italic;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.75rem;
      padding-bottom: 0.35rem;
      border-bottom: 1px solid var(--border);
    }

    /* ── States ── */
    .empty {
      color: var(--muted);
      font-style: italic;
      padding: 0.5rem 0;
    }
    .loading-msg {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 2rem 0;
    }
    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
      padding: 1rem 1.25rem;
      color: #7f1d1d;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    @media (max-width: 520px) {
      body { padding: 2rem 1rem 4rem; }
      h1   { font-size: 2.1rem; }
      .book-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; }
      .page-header { flex-direction: column; gap: 0.25rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .reading-badge::before { animation: none; }
      .grid-overlay, .current-card { transition: none; }
    }
  </style>
</head>
<body>
  <div id="app">
    <p class="loading-msg">Loading…</p>
  </div>

  <script>
    /* ── Helpers ── */

    function stars(n) {
      n = parseInt(n, 10) || 0;
      return n ? '★'.repeat(n) + '☆'.repeat(5 - n) : '';
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (isNaN(d)) return '';
      const days = Math.floor((Date.now() - d) / 86_400_000);
      if (days < 1)   return 'today';
      if (days < 7)   return `${days}d ago`;
      if (days < 30)  return `${Math.floor(days / 7)}w ago`;
      if (days < 365) return `${Math.floor(days / 30)}mo ago`;
      return `${Math.floor(days / 365)}y ago`;
    }

    function makeCover(src, title, isCurrent) {
      if (src) {
        const img = document.createElement('img');
        img.src     = src;
        img.alt     = title || '';
        img.loading = 'lazy';
        img.className = isCurrent ? 'cover-img' : 'grid-cover';
        return img;
      }
      const ph = document.createElement('div');
      ph.className  = isCurrent ? 'cover-placeholder' : 'grid-placeholder';
      ph.textContent = (title || '?')[0].toUpperCase();
      return ph;
    }

    /* ── Renderers ── */

    function renderCurrent(books, container) {
      if (!books || books.length === 0) {
        const p = document.createElement('p');
        p.className   = 'empty';
        p.textContent = 'Nothing on the nightstand right now.';
        container.appendChild(p);
        return;
      }

      books.forEach(book => {
        const card = document.createElement('a');
        card.className = 'current-card';
        card.href      = book.link || '#';
        card.target    = '_blank';
        card.rel       = 'noopener noreferrer';

        const wrap = document.createElement('div');
        wrap.className = 'cover-wrap';
        wrap.appendChild(makeCover(book.cover, book.title, true));

        const info = document.createElement('div');
        info.className = 'current-info';
        info.innerHTML = `
          <div class="book-title">${book.title || 'Unknown title'}</div>
          <div class="book-author">${book.author ? 'by ' + book.author : '&nbsp;'}</div>
          <span class="reading-badge">Reading now</span>
        `;

        card.appendChild(wrap);
        card.appendChild(info);
        container.appendChild(card);
      });
    }

    function renderHistory(books, container) {
      if (!books || books.length === 0) {
        const p = document.createElement('p');
        p.className   = 'empty';
        p.textContent = 'No books logged yet.';
        container.appendChild(p);
        return;
      }

      // Group by read year, falling back to add year, then 'Earlier'
      const groups = new Map();
      books.forEach(book => {
        const d = book.dateRead ? new Date(book.dateRead)
                : book.dateAdded ? new Date(book.dateAdded)
                : null;
        const key = (d && !isNaN(d)) ? String(d.getFullYear()) : 'Earlier';
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(book);
      });

      const sortedKeys = [...groups.keys()].sort((a, b) => {
        if (a === 'Earlier') return 1;
        if (b === 'Earlier') return -1;
        return parseInt(b) - parseInt(a);
      });

      function makeGridItem(book) {
        const item = document.createElement('div');
        item.className = 'grid-item';
        const overlay = document.createElement('div');
        overlay.className = 'grid-overlay';
        overlay.innerHTML = `
          <div class="overlay-title">${book.title || '—'}</div>
          <div class="overlay-author">${book.author || ''}</div>
          ${book.rating && book.rating !== '0'
            ? `<div class="stars">${stars(book.rating)}</div>`
            : ''}
        `;
        item.appendChild(makeCover(book.cover, book.title, false));
        item.appendChild(overlay);
        return item;
      }

      sortedKeys.forEach(year => {
        const group = document.createElement('div');
        group.className = 'year-group';

        const label = document.createElement('div');
        label.className = 'year-label';
        label.textContent = year;
        group.appendChild(label);

        const grid = document.createElement('div');
        grid.className = 'book-grid';
        groups.get(year).forEach(book => grid.appendChild(makeGridItem(book)));
        group.appendChild(grid);

        container.appendChild(group);
      });
    }

    function render(data) {
      const app = document.getElementById('app');
      app.innerHTML = '';

      /* Header */
      const header = document.createElement('header');
      header.className = 'page-header';
      header.innerHTML = `
        <h1>Reading</h1>
        <span class="updated">Updated ${timeAgo(data.lastUpdated)}</span>
      `;
      app.appendChild(header);

      /* Currently reading */
      const currentSection = document.createElement('section');
      currentSection.id = 'current';
      const currentHead = document.createElement('div');
      currentHead.className = 'section-head';
      currentHead.innerHTML = '<h2>Currently Reading</h2>';
      currentSection.appendChild(currentHead);
      renderCurrent(data.currentlyReading, currentSection);
      app.appendChild(currentSection);

      /* History */
      const histSection = document.createElement('section');
      histSection.id = 'history';
      const histHead = document.createElement('div');
      histHead.className = 'section-head';
      const n = (data.read || []).length;
      histHead.innerHTML = `<h2>Read</h2><span class="count">${n} book${n !== 1 ? 's' : ''}</span>`;
      histSection.appendChild(histHead);
      renderHistory(data.read, histSection);
      app.appendChild(histSection);
    }

    function renderError(msg) {
      document.getElementById('app').innerHTML = `
        <div class="error-box">
          <strong>Couldn't load books.json.</strong><br>
          ${msg}<br><br>
          Make sure the GitHub Action has run at least once and <code>books.json</code>
          is in the same directory as this page.
        </div>
      `;
    }

    /* ── Boot ── */
    fetch('books.json')
      .then(r => {
        if (!r.ok) throw new Error(`HTTP ${r.status} — is books.json committed to the repo?`);
        return r.json();
      })
      .then(render)
      .catch(err => renderError(err.message));
  </script>
</body>
</html>
