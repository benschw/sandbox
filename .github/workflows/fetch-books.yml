name: Fetch Books from Goodreads

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 6 AM UTC
  workflow_dispatch:       # allows manual run from the Actions tab

permissions:
  contents: write

jobs:
  fetch-books:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch books from Goodreads RSS
        env:
          GOODREADS_USER_ID: ${{ vars.GOODREADS_USER_ID }}
        run: python books/scripts/fetch_books.py

      - name: Sync all series from Goodreads
        run: python books/scripts/sync_all_series.py

      - name: Regenerate series_unread.json
        run: python books/scripts/sync_unread_series_books.py

      - name: Commit changes if any
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add books/data/books.json books/data/goodreads_series_index.json books/data/series_unread.json
          git diff --staged --quiet || git commit -m "chore: update books"
          git push
